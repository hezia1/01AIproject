services:
  postgres:
    image: postgres:16
    container_name: ai-security-postgres
    environment:
      POSTGRES_DB: ai_security
      POSTGRES_USER: ai_security
      POSTGRES_PASSWORD: ai_security_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-security-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

